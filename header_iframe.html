<style>
  @keyframes bob {
    0% {
      transform: translateY(0);
    }

    50% {
      transform: translateY(-15px);
    }

    100% {
      transform: translateY(0);
    }
  }

  body {
    animation: bob 3s ease-in-out infinite;
  }
</style>
